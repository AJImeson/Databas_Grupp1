stages:
  - lint
  - test

# Tests SQL syntax for errors. this test runs every commit.
lint_test_sql:
  stage: lint
  image: python:3.13.1
  before_script:
    - pip install sqlfluff
  script:
    - bash scripts/sqlfluff.sh 
  rules:
    - if : $CI_PIPELINE_SOURCE == "push"

# Dry runs the database with all the migrations files. If any step fails it stops.
dry_run_db:
  stage: test
  image: alpine:latest 
  services:
    - name: mariadb:12.0.2
      alias: db_test
  before_script:
    - apk add --no-bin-cache bash mariadb-client
  variables:
    MARIADB_DATABASE: test_db
    MARIADB_ROOT_PASSWORD: test_passwd
    MARIADB_HOST: db_test 
  script:
    - bash scripts/mariadb-test.sh
  rules:
    - if: $CI_PIPELINE_SOURCE =="merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
